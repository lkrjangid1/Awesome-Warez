<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search — Awesome Warez</title>
<meta name="description" content="Search across all warez resources indexed on this site.">
<meta name="color-scheme" content="dark light">
<meta property="og:title" content="Search — Awesome Warez">
<meta property="og:description" content="Search across all warez resources indexed on this site.">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<script>(function(){var t=localStorage.getItem('theme');if(!t){t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
<header class="site-header">
  <div class="bar">
    <a class="brand" href="index.html">
      <img src="assets/img/logo.svg" alt="" width="28" height="28">
      <span>Awesome Warez</span>
    </a>
    <form class="search-form" role="search" action="search.html" method="get">
      <input type="search" name="q" placeholder="Search 10,000+ links…   press /" aria-label="Search" autocomplete="off">
      <button type="submit" aria-label="Search">Search</button>
    </form>
    <nav class="nav-actions">
      <a class="nav-link" href="about.html">About</a>
      <button class="theme-toggle" type="button" aria-label="Toggle theme">
        <span class="theme-icon" data-icon="dark">☾</span>
        <span class="theme-icon" data-icon="light">☀</span>
      </button>
    </nav>
  </div>
</header>
<script src="assets/js/theme.js" defer></script>

<main class="container">
  <h1>Search</h1>
  <form class="hero-search" id="search-form" role="search">
    <input type="search" id="q" name="q" placeholder="Type to search…" autocomplete="off" autofocus aria-label="Search query">
    <button type="submit">Search</button>
  </form>
  <p class="muted small" id="status">Loading index…</p>
  <noscript><p>Search requires JavaScript. <a href="index.html">Browse by category instead</a>.</p></noscript>
  <div id="results"></div>
</main>
<script src="assets/js/fuse.min.js" defer></script>
<script src="assets/js/search.js" defer></script>

<footer class="site-footer">
  <div class="bar">
    <p>An index of warez resources — pure static HTML, no tracking. <a href="about.html">About &amp; legal</a>.</p>
    <p class="muted">Updated 2026-05-24 · <a href="https://github.com/lkrjangid1/Awesome-Warez">Source on GitHub</a></p>
  </div>
</footer>
</body></html>
